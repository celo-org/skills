name: Tag Skill Release

on:
  push:
    branches: [main]
    paths:
      - 'skills/celo-skill/SKILL.md'

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and create tag
        run: |
          VERSION=$(grep -E '^[[:space:]]*version:' skills/celo-skill/SKILL.md | head -1 | sed -E 's/^[[:space:]]*version:[[:space:]]*//; s/^"(.*)"$/\1/; s/^'"'"'(.*)'"'"'$/\1/')
          if [ -z "${VERSION}" ]; then
            echo "Could not extract version from skills/celo-skill/SKILL.md"
            exit 1
          fi
          TAG="celo-skill-v${VERSION}"
          echo "Detected version: ${VERSION}, tag: ${TAG}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag ${TAG}"
          fi
